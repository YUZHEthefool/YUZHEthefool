name: Fetch GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

  push:
    branches:
      - main
      - master


jobs:
  fetch:

    runs-on: ubuntu-latest

    permissions:
      contents: write


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Fetch GitHub Stats SVG
        run: |

          curl -L \
          "https://github-readme-stats-r4ol293mc-thefoolyuzhe-5613s-projects.vercel.app/api?username=YUZHEthefool&show_icons=true&include_all_commits=true&theme=tokyonight&hide_border=true" \
          -o github-stats.svg


      - name: Commit changes
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"


          git add github-stats.svg


          git commit -m "Update GitHub Stats" || exit 0


          git push
